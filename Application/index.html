<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Neev Academy — Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Libre+Baskerville:wght@400;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --navy:#0d2456; --navy-deep:#081737; --navy-soft:#1e3a6e;
  --amber:#f0a11c; --amber-deep:#d98c0a;
  --cream:#faf6ec; --paper:#fdfaf2;
  --ink:#17233f; --mut:#6b7691; --line:#e3e0d4;
  --ok:#1d8a4e; --bad:#c93b3b; --warn:#c47f0e;
  --card:#ffffff; --bg:#f2efe6;
  --r:14px; --sh:0 1px 2px rgba(13,36,86,.06),0 6px 20px -8px rgba(13,36,86,.12);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Manrope',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:15px}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:15px;color:var(--ink)}
.hide{display:none!important}
.serif{font-family:'Libre Baskerville',Georgia,serif}

/* ---------- login ---------- */
#loginView{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(120% 90% at 50% 0%,#12306e 0%,var(--navy-deep) 55%,#050d22 100%);padding:20px}
.loginCard{width:100%;max-width:400px;text-align:center}
.loginCard img{width:120px;height:120px;border-radius:50%;box-shadow:0 0 0 4px rgba(240,161,28,.35),0 18px 40px -12px rgba(0,0,0,.6)}
.loginCard h1{font-family:'Libre Baskerville',serif;color:#fff;font-size:28px;letter-spacing:.06em;margin-top:18px}
.loginCard .tag{color:var(--amber);font-weight:600;font-size:13px;letter-spacing:.14em;text-transform:uppercase;margin-top:4px}
.loginTabs{display:flex;gap:8px;margin:26px 0 14px;background:rgba(255,255,255,.08);padding:5px;border-radius:12px}
.loginTabs button{flex:1;padding:10px;border-radius:9px;color:#cdd6ea;font-weight:700;font-size:14px}
.loginTabs button.on{background:var(--amber);color:#231500}
.loginCard .fld{margin-top:12px;text-align:left}
.loginCard label{display:block;color:#9fb0d4;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.loginCard input{width:100%;padding:13px 14px;border-radius:11px;border:2px solid rgba(255,255,255,.25);background:#ffffff;color:#111111;-webkit-text-fill-color:#111111;caret-color:#111111;font-size:16px;font-weight:600}
.loginCard input:focus{outline:none;border-color:var(--amber)}
.loginCard input::placeholder{color:#9aa3b5;-webkit-text-fill-color:#9aa3b5;font-weight:500}
.btnGold{width:100%;margin-top:18px;padding:14px;border-radius:12px;background:linear-gradient(180deg,#f7b23a,var(--amber-deep));color:#231500;font-weight:800;font-size:15px;letter-spacing:.03em;box-shadow:0 10px 24px -8px rgba(240,161,28,.55)}
.pinWrap{position:relative}
.pinWrap .pinInp{padding-right:52px;font-size:22px;letter-spacing:8px;font-family:Verdana,Arial,sans-serif;color:#111111 !important;caret-color:#111111;-webkit-text-fill-color:#111111 !important}
.pinWrap .pinInp::placeholder{font-size:14px;letter-spacing:normal;font-family:'Manrope',sans-serif}
.pinEye{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:10px;font-size:18px;color:#0d2456;background:#eef1f7;border:1px solid #dfe3ec}
.loginCard input:-webkit-autofill{-webkit-text-fill-color:#111 !important;-webkit-box-shadow:0 0 0 40px #fff inset !important;transition:background-color 9999s ease-in-out 0s}
.loginErr{color:#ff9a9a;font-size:13px;margin-top:10px;min-height:18px;font-weight:600}
.loginHint{color:#637193;font-size:12px;margin-top:16px}

/* ---------- app frame ---------- */
#appView{display:flex;min-height:100vh}
.side{width:230px;background:linear-gradient(180deg,var(--navy) 0%,var(--navy-deep) 100%);color:#fff;position:fixed;top:0;bottom:0;left:0;display:flex;flex-direction:column;z-index:40}
.side .brand{display:flex;align-items:center;gap:10px;padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.1)}
.side .brand img{width:44px;height:44px;border-radius:50%;box-shadow:0 0 0 2px rgba(240,161,28,.4)}
.side .brand b{font-family:'Libre Baskerville',serif;font-size:15px;letter-spacing:.04em;display:block}
.side .brand span{font-size:10.5px;color:var(--amber);font-weight:600;letter-spacing:.08em}
.nav{flex:1;overflow-y:auto;padding:10px 8px}
.nav button{display:flex;align-items:center;gap:11px;width:100%;padding:11px 12px;border-radius:10px;color:#b8c4de;font-weight:600;font-size:14px;margin-bottom:2px;text-align:left}
.nav button svg{width:19px;height:19px;flex:none}
.nav button.on{background:rgba(240,161,28,.16);color:#ffcf7d}
.nav button:hover{background:rgba(255,255,255,.07)}
.side .foot{padding:12px;border-top:1px solid rgba(255,255,255,.1)}
.side .foot button{width:100%;padding:10px;border-radius:10px;background:rgba(255,255,255,.08);color:#dfe6f4;font-weight:700;font-size:13px}
.main{flex:1;margin-left:230px;padding:22px clamp(14px,3vw,34px) 90px;max-width:1200px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.topbar h2{font-family:'Libre Baskerville',serif;font-size:clamp(20px,3vw,26px);color:var(--navy)}
.topbar .sub{color:var(--mut);font-size:13px;margin-top:3px}

/* bottom nav mobile */
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--navy-deep);z-index:50;padding:6px 4px calc(6px + env(safe-area-inset-bottom));box-shadow:0 -6px 20px rgba(0,0,0,.25)}
.bnav .in{display:flex;justify-content:space-around;max-width:560px;margin:0 auto}
.bnav button{display:flex;flex-direction:column;align-items:center;gap:3px;color:#8ea0c8;font-size:10px;font-weight:700;padding:6px 4px;border-radius:10px;min-width:46px}
.bnav button svg{width:21px;height:21px}
.bnav button.on{color:var(--amber)}
@media(max-width:900px){.side{display:none}.main{margin-left:0;padding-top:14px}.bnav{display:block}}

/* ---------- components ---------- */
.grid{display:grid;gap:14px}
.g2{grid-template-columns:repeat(auto-fit,minmax(230px,1fr))}
.g4{grid-template-columns:repeat(auto-fit,minmax(160px,1fr))}
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:16px;border:1px solid #edeade}
.stat{position:relative;overflow:hidden}
.stat .lb{font-size:11.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--mut)}
.stat .v{font-size:26px;font-weight:800;color:var(--navy);margin-top:6px;font-variant-numeric:tabular-nums}
.stat .v small{font-size:13px;color:var(--mut);font-weight:600}
.stat::after{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--amber)}
.stat.blue::after{background:var(--navy-soft)}
.stat.green::after{background:var(--ok)}
.stat.red::after{background:var(--bad)}
.sect{font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);margin:22px 0 10px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 16px;border-radius:11px;font-weight:700;font-size:13.5px;transition:transform .08s}
.btn:active{transform:scale(.97)}
.btn svg{width:16px;height:16px}
.btn.p{background:var(--navy);color:#fff;box-shadow:0 6px 16px -6px rgba(13,36,86,.5)}
.btn.a{background:var(--amber);color:#231500;box-shadow:0 6px 16px -6px rgba(240,161,28,.55)}
.btn.o{background:#fff;border:1.5px solid var(--line);color:var(--navy)}
.btn.g{background:#e9f7ef;color:var(--ok)}
.btn.r{background:#fdecec;color:var(--bad)}
.btn.wa{background:#e7f8ed;color:#128c4b}
.btn.sm{padding:7px 11px;font-size:12.5px;border-radius:9px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.chip{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:11.5px;font-weight:700}
.chip.g{background:#e5f5ec;color:var(--ok)}.chip.r{background:#fdeaea;color:var(--bad)}.chip.y{background:#fcf2dd;color:var(--warn)}.chip.b{background:#e8eefb;color:var(--navy-soft)}.chip.gr{background:#eef0f4;color:var(--mut)}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);margin-bottom:6px}
.fld input,.fld select,.fld textarea{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;background:#fff;font-size:15px}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--amber)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:520px){.frow{grid-template-columns:1fr}}
.tbl{width:100%;border-collapse:collapse;font-size:14px}
.tbl th{text-align:left;padding:9px 10px;font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--mut);border-bottom:2px solid var(--line)}
.tbl td{padding:11px 10px;border-bottom:1px solid #f0eee4;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tblWrap{overflow-x:auto}
.search{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.search input,.search select{padding:10px 13px;border:1.5px solid var(--line);border-radius:11px;background:#fff;font-size:14px}
.search input{flex:1;min-width:160px}
.empty{text-align:center;padding:36px 16px;color:var(--mut)}
.empty b{display:block;color:var(--navy);font-size:16px;margin-bottom:5px}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--navy);color:#ffcf7d;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex:none}

/* modal */
.mback{position:fixed;inset:0;background:rgba(8,20,50,.55);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:flex-end;justify-content:center;padding:0}
@media(min-width:640px){.mback{align-items:center;padding:24px}}
.modal{background:#fff;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;border-radius:20px 20px 0 0;padding:20px}
@media(min-width:640px){.modal{border-radius:18px}}
.modal.wide{max-width:880px}
.mhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.mhead h3{font-family:'Libre Baskerville',serif;font-size:19px;color:var(--navy)}
.mx{width:34px;height:34px;border-radius:50%;background:#f1efe5;font-size:16px;color:var(--mut);font-weight:700}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:84px;background:var(--navy-deep);color:#fff;padding:12px 20px;border-radius:12px;font-weight:700;font-size:14px;z-index:200;box-shadow:0 12px 30px rgba(0,0,0,.3);opacity:0;transition:opacity .25s;pointer-events:none;max-width:90vw;text-align:center}
.toast.show{opacity:1}
.noteIco svg{width:24px;height:24px;display:block}
@media(min-width:900px){.toast{bottom:30px}}

/* attendance marks */
.attRow{display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid #f0eee4}
.attRow:last-child{border-bottom:none}
.attRow .nm{flex:1;min-width:0}.attRow .nm b{display:block;font-size:14.5px}.attRow .nm span{font-size:12px;color:var(--mut)}
.pal{display:flex;gap:6px}
.pal button{width:38px;height:38px;border-radius:10px;font-weight:800;font-size:13px;border:1.5px solid var(--line);color:var(--mut);background:#fff}
.pal button.P.on{background:var(--ok);border-color:var(--ok);color:#fff}
.pal button.A.on{background:var(--bad);border-color:var(--bad);color:#fff}
.pal button.L.on{background:var(--warn);border-color:var(--warn);color:#fff}
.pal button.C{width:auto;padding:0 12px}
.pal button.I{width:auto;padding:0 12px}
.pal button.C.on{background:var(--ok);border-color:var(--ok);color:#fff}
.pal button.I.on{background:var(--bad);border-color:var(--bad);color:#fff}
.hwTopic{width:100%;padding:11px 13px;border-radius:11px;border:1.5px solid var(--line);background:#fff;font-size:14px}
.hwTopic:focus{outline:none;border-color:var(--amber)}
.monthsPick{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px}
.monthsPick button{padding:10px 6px;border-radius:10px;border:1.5px solid var(--line);font-weight:700;font-size:13px;background:#fff;color:var(--ink)}
.monthsPick button.paid{background:#eef7f1;border-color:#bfe3cd;color:var(--ok);cursor:not-allowed}
.monthsPick button.part{background:#fdf6e7;border-color:#ecd39a;color:var(--warn)}
.monthsPick button.part.sel,.monthsPick button.sel{background:var(--navy);border-color:var(--navy);color:#fff}
.progress{height:8px;background:#eceadf;border-radius:99px;overflow:hidden}
.progress i{display:block;height:100%;background:var(--ok);border-radius:99px}

/* ---------- RECEIPT (matches uploaded design) ---------- */
.rcptStage{background:#d8d5c8;padding:14px;border-radius:14px;overflow:auto}
.rcpt{width:794px;min-height:1123px;background:#fcfcf5;margin:0 auto;position:relative;font-family:'Manrope','Trebuchet MS',Arial,sans-serif;color:#344769;display:flex;flex-direction:column;padding:58px 54px 0}
.rcpt .logo{display:block;margin:0 auto;width:133px;height:133px;border-radius:50%}
.rcpt .hdrImg{display:block;margin:16px auto 0;width:546px}
.rcpt .frTitle{display:flex;align-items:center;gap:14px;margin-top:20px}
.rcpt .frTitle::before,.rcpt .frTitle::after{content:"";flex:1;height:3px;background:#1f3862}
.rcpt .frTitle img{height:28px;display:block}
.rcpt .meta{margin-top:37px;font-size:18.5px;font-weight:600;line-height:1.38;color:#344769}
.rcpt .issued{margin-top:52px;font-size:18.5px;font-weight:600;line-height:1.4;color:#344769}
.rcpt table{width:100%;border-collapse:collapse;margin-top:38px;font-size:18px;border:2.5px solid #1f3862}
.rcpt table th{background:#1f3862;color:#fff;font-weight:700;padding:6px 10px;border:2px solid #1f3862}
.rcpt table th:first-child{width:88px}
.rcpt table th:last-child{width:238px}
.rcpt table td{padding:5px 10px;text-align:center;border:1.5px solid #6c7fa5;font-weight:600;color:#344769}
.rcpt .totals{margin-top:36px;text-align:right;font-size:18px;font-weight:700;line-height:1.3;color:#344769;padding-right:6px}
.rcpt .totals .line{border-top:3px solid #1f3862;margin:7px 0 6px;margin-left:auto;width:295px}
.rcpt .totals .tt{font-size:21px;font-weight:800;color:#1f3862}
.rcpt .bottom{display:flex;justify-content:space-between;align-items:flex-end;margin-top:24px}
.rcpt .pay{font-size:17px;font-weight:600;line-height:1.5;color:#344769}
.rcpt .sig{text-align:center;font-size:17px;font-weight:600;color:#344769}
.rcpt .sig .scriptImg{display:block;height:34px;width:auto;margin:8px auto 0;padding:0 16px 5px;border-bottom:2px solid #1f3862}
.rcpt .sig .who{margin-top:6px;line-height:1.35}
.rcpt .footer{margin-top:auto;border-top:5px solid #1f3862;padding:16px 8px 32px;text-align:center;font-family:'Courier New',monospace;font-weight:700;font-size:15px;color:#111;line-height:1.7}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="loginView">
  <div class="loginCard">
    <img id="loginLogo" alt="Neev Academy">
    <h1>NEEV ACADEMY</h1>
    <div class="tag">Building Strong Foundations</div>
    <div class="loginTabs">
      <button id="tabAdmin" class="on" onclick="setLoginTab('admin')">Teacher / Admin</button>
      <button id="tabStudent" onclick="setLoginTab('student')">Student</button>
    </div>
    <div id="adminLoginBox">
      <div class="fld"><label>Admin PIN</label><div class="pinWrap">
<input type="password" inputmode="numeric" autocomplete="off" id="adminPin" class="pinInp" placeholder="Enter PIN" onkeydown="if(event.key==='Enter')doAdminLogin()">
<button type="button" class="pinEye" onclick="togglePin()" aria-label="Show PIN" id="pinEyeBtn">&#128065;</button></div></div>
      <button class="btnGold" onclick="doAdminLogin()">Open Dashboard</button>
    </div>
    <div id="studentLoginBox" class="hide">
      <div class="fld"><label>Student ID</label><input id="stuIdInp" placeholder="e.g. NA-001" autocapitalize="characters"></div>
      <div class="fld"><label>Registered Mobile</label><input id="stuPhInp" inputmode="numeric" placeholder="10-digit mobile number"></div>
      <div class="fld"><label>Password</label><div class="pinWrap">
<input type="password" autocomplete="off" id="stuPassInp" class="pinInp" style="font-size:16px;letter-spacing:2px" placeholder="Given by your teacher" onkeydown="if(event.key==='Enter')doStudentLogin()">
<button type="button" class="pinEye" onclick="toggleStuPass()" aria-label="Show password" id="stuPassEyeBtn">&#128065;</button></div></div>
      <button class="btnGold" onclick="doStudentLogin()">View My Portal</button>
    </div>
    <div class="loginErr" id="loginErr"></div>
    <div class="loginHint" id="loginHint">Please Enter Your Details </div>
  </div>
</div>

<!-- ============ ADD STUDENT MODAL ============ -->
<div class="mback">
  <div class="modal">
    <div class="mhead">
      <h3 class="serif">Add student</h3>
      <button class="mx" aria-label="Close modal">×</button>
    </div>

    <div class="grid">
      <!-- Row 1: ID and Full Name -->
      <div class="frow">
        <div class="fld">
          <label>Student ID</label>
          <input type="text" value="NA-001" readonly style="background: #fdfaf2; font-weight: 600;">
        </div>
        <div class="fld">
          <label>Full Name</label>
          <input type="text" placeholder="e.g. Student's Name">
        </div>
      </div>

      <!-- Row 2: Grade and Board -->
      <div class="frow">
        <div class="fld">
          <label>Grade</label>
          <select>
            <option selected>Jr.Kg</option>
            <option>Sr.Kg</option>
            <option>Nursery</option>
          </select>
        </div>
        <div class="fld">
          <label>Board</label>
          <select>
            <option selected>SSC (State)</option>
            <option>CBSE</option>
            <option>ICSE</option>
          </select>
        </div>
      </div>

      <!-- Row 3: Medium and Monthly Fee -->
      <div class="frow">
        <div class="fld">
          <label>Medium</label>
          <select>
            <option selected>English</option>
            <option>Hindi</option>
            <option>Marathi</option>
          </select>
        </div>
        <div class="fld">
          <label>Monthly Fee (₹)</label>
          <input type="number" placeholder="Monthly Fees">
        </div>
      </div>

      <!-- Row 4: Parent Info and Mobile -->
      <div class="frow">
        <div class="fld">
          <label>Parent / Guardian</label>
          <input type="text" placeholder="Parent name">
        </div>
        <div class="fld">
          <label>WhatsApp Mobile</label>
          <input type="tel" placeholder="10-digit number">
        </div>
      </div>

      <!-- Row 5: Fees Start and Status -->
      <div class="frow">
        <div class="fld">
          <label>Fees Start From</label>
          <select>
            <option selected>June</option>
            <option>April</option>
            <option>January</option>
          </select>
        </div>
        <div class="fld">
          <label>Status</label>
          <select>
            <option selected>Active</option>
            <option>Inactive</option>
          </select>
        </div>
      </div>

      <!-- Row 6: Password Options (Span Full Width) -->
      <div class="fld" style="margin-top: 6px;">
        <label style="color: var(--amber); font-weight: 800;">Portal Password · Not Set</label>
        <div class="frow">
          <input type="text" placeholder="Student login password">
          <button class="btn o" style="justify-content: center; height: 46px; border-radius: 10px;">Generate password</button>
        </div>
        <p style="font-size: 12px; color: var(--mut); margin-top: 6px; font-weight: 500;">
          Student will need this password (with ID & mobile) to open their portal. Leave blank to allow login without a password.
        </p>
      </div>

      <!-- Save Button Row -->
      <button class="btn p" style="width: 100%; justify-content: center; padding: 14px; font-size: 15px; margin-top: 10px;">
        Save student
      </button>
    </div>
  </div>
</div>

<!-- hidden receipt render stage for PDF -->

/* ---------- LOCAL MODE (USE_DATABASE=false): phone storage, instant ---------- */
function lsGet(k,d){try{const v=localStorage.getItem(k);return v===null?d:JSON.parse(v)}catch(e){return d}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){toast('⚠️ Phone storage is full — could not save');console.error(e)}}

const KV_ENDPOINT = '/.netlify/functions/kv';

async function mongoGet(k){
  const r = await fetch(KV_ENDPOINT + '?key=' + encodeURIComponent(k));
  if (r.status === 404) throw 'missing';
  if (!r.ok) throw 'error';
  return (await r.json()).v;
}
async function mongoSet(k, v){
  const r = await fetch(KV_ENDPOINT + '?key=' + encodeURIComponent(k), {
    method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({v})
  });
  if (!r.ok) throw 'error';
}
async function mongoDel(k){
  await fetch(KV_ENDPOINT + '?key=' + encodeURIComponent(k), { method: 'DELETE' });
}

async function sget(k,d){
  if(!USE_DATABASE)return lsGet(k,d);
  try{ return JSON.parse(await mongoGet(k)); }
  catch(e){ if(e!=='missing') console.error(e); return d; }
}
async function sset(k,v){
  if(!USE_DATABASE){lsSet(k,v);return}
  try{ await mongoSet(k, JSON.stringify(v)); }
  catch(e){ toast('⚠️ Could not sync — check internet'); console.error(e); }
}
async function sdel(k){
  if(!USE_DATABASE){try{localStorage.removeItem(k)}catch(e){}return}
  await mongoDel(k).catch(()=>{});
}
async function ssetBig(k,str){
  if(!USE_DATABASE){try{localStorage.setItem(k,str)}catch(e){throw 'quota'}return}
  const CH=700000;const n=Math.ceil(str.length/CH);
  for(let i=0;i<n;i++) await mongoSet(k+':'+i, str.slice(i*CH,(i+1)*CH));
  await mongoSet(k, JSON.stringify({chunks:n}));
}
async function sgetBig(k){
  if(!USE_DATABASE){const v=localStorage.getItem(k);if(v===null)throw 'missing';return v}
  const meta = JSON.parse(await mongoGet(k));
  const n = meta.chunks || 0; let out='';
  for(let i=0;i<n;i++) out += await mongoGet(k+':'+i);
  return out;
}
async function sdelBig(k){
  if(!USE_DATABASE){try{localStorage.removeItem(k)}catch(e){}return}
  try{
    const meta = JSON.parse(await mongoGet(k));
    const n = meta.chunks || 0;
    for(let i=0;i<n;i++) await sdel(k+':'+i);
    await sdel(k);
  }catch(e){}
}

/* ---------- CARRY-FORWARD: pending fees from previous sessions ----------
   Old sessions' fee data is loaded read-only so last year's pending fees
   show up right inside the current session — no need to keep switching. */
let PREVS=[];
async function loadPrevSessions(){
  PREVS=[];
  const i=SESSIONS.indexOf(DB.settings.session);
  for(let j=0;j<i;j++){
    const sess=SESSIONS[j];
    let students=await sget('na:'+sess+':students',null);
    let payments=await sget('na:'+sess+':payments',null);
    if(j===0){ /* very first session may still be on old-style keys */
      if(students===null)students=await sget('na:students',null);
      if(payments===null)payments=await sget('na:payments',null);
    }
    PREVS.push({session:sess,students:students||[],payments:payments||[]});
  }
}
function prevSessionDue(P,s){ /* [{label,remaining,credit}] of session P still unpaid for student record s */
  const fee=+s.fee||0;
  const info={};
  P.payments.filter(p=>p.studentId===s.id&&!p.void).forEach(p=>p.months.forEach(m=>{
    info[m.label]=info[m.label]||{credit:0,legacyFull:false};
    info[m.label].credit+=(+m.amount||0);if(m.of==null)info[m.label].legacyFull=true;}));
  let st=0;if(s.joinMonth){const j=SESSION_MONTHS.indexOf(s.joinMonth);if(j>=0)st=j}
  const out=[];
  for(let i=st;i<SESSION_MONTHS.length;i++){
    const m=SESSION_MONTHS[i];const x=info[m]||{credit:0,legacyFull:false};
    if(x.legacyFull||(fee>0&&x.credit>=fee-0.001))continue;
    out.push({label:m,credit:x.credit,remaining:Math.max(0,fee-x.credit)});
  }
  return out;
}
function oldPendingList(){ /* every (student, old session) that still owes money */
  const out=[];
  PREVS.forEach(P=>P.students.forEach(s=>{
    if(s.active===false)return;
    const months=prevSessionDue(P,s);
    if(months.length)out.push({session:P.session,stu:s,months,amount:months.reduce((a,x)=>a+x.remaining,0)});
  }));
  return out.sort((a,b)=>b.amount-a.amount);
}
function prevDuesFor(stuId){return oldPendingList().filter(x=>x.stu.id===stuId)}
function oldPendingTotal(){return oldPendingList().reduce((a,x)=>a+x.amount,0)}

  if(v!==null)return v;
  const legacy=await sget('na:'+name,null);
  if(legacy!==null){sset(skey(name),legacy);return legacy}
  return def;
}

/* ---------- month-wise fee credit (supports PARTIAL / lump-sum payments) ----------
   Each payment records how much money was credited to each month. A month can be
   fully paid, PARTLY paid (balance remains), or unpaid. Old receipts (before this
   update) always meant "month fully paid" and are treated exactly that way. */
function monthPayInfo(stuId,label){
  let credit=0,legacyFull=false;
  DB.payments.filter(p=>p.studentId===stuId&&!p.void).forEach(p=>p.months.forEach(m=>{
    if(m.label!==label)return;credit+=(+m.amount||0);if(m.of==null)legacyFull=true;}));
  return{credit,legacyFull};
}
function monthStatus(stu,label){
  const fee=+stu.fee||0;const inf=monthPayInfo(stu.id,label);
  if(inf.legacyFull||(fee>0&&inf.credit>=fee-0.001))return{state:'paid',credit:inf.credit,remaining:0};
  if(inf.credit>0)return{state:'part',credit:inf.credit,remaining:Math.max(0,fee-inf.credit)};
  return{state:'due',credit:0,remaining:fee};
}
function paidMonths(stuId){const s=student(stuId);const set=new Set();if(!s)return set;
  SESSION_MONTHS.forEach(m=>{if(monthStatus(s,m).state==='paid')set.add(m)});return set}
function currentSessionMonthIndex(){
  /* fee cycle runs June → April. Once a session is created its fees start
     counting from June immediately. If the session is already over
     (calendar-wise, past April of its end year), every month counts. */
  const m=/^(\d{2})-(\d{2})$/.exec(String(DB.settings.session||''));
  const now=new Date();
  if(m){
    const startY=2000+ +m[1];
    if(now>new Date(startY+1,3,30,23,59,59))return SESSION_MONTHS.length-1;
  }
  const mName=now.toLocaleString('en-GB',{month:'long'});
  if(mName==='May')return SESSION_MONTHS.length-1; /* in May, the whole year's fees are countable */
  const i=SESSION_MONTHS.indexOf(mName);return i<0?0:i}
function dueDetail(stu){ /* [{label,state,credit,remaining}] for every not-fully-paid month up to now */
  let startIdx=0;
  if(stu.joinMonth){const j=SESSION_MONTHS.indexOf(stu.joinMonth);if(j>=0)startIdx=j}
  const upto=currentSessionMonthIndex();
  const out=[];
  for(let i=startIdx;i<=upto;i++){const m=SESSION_MONTHS[i];const st=monthStatus(stu,m);if(st.state!=='paid')out.push({label:m,...st})}
  return out;
}
function dueMonths(stu){return dueDetail(stu).map(x=>x.label)}
function pendingAmount(stu){return dueDetail(stu).reduce((a,x)=>a+x.remaining,0)}
function waLink(phone,msg){const cc=DB.settings.waCountry||'91';let p=String(phone||'').replace(/\D/g,'');if(p.length===10)p=cc+p;return 'https://wa.me/'+p+'?text='+encodeURIComponent(msg)}
function attStats(stuId){let p=0,t=0;Object.values(DB.attendance).forEach(day=>{const v=day[stuId];if(v){t++;if(v==='P')p++}});return{present:p,total:t,pct:t?Math.round(p*100/t):null}}
function hwStats(stuId){let c=0,t=0;Object.values(DB.homework).forEach(day=>{const v=day[stuId];if(v==='C'||v==='I'){t++;if(v==='C')c++}});return{done:c,total:t,pct:t?Math.round(c*100/t):null}}

  window.open(waLink(s.phone,msg),'_blank');
}
let settleSel=[];
function openSettle(sess,stuId){
  const P=PREVS.find(x=>x.session===sess);if(!P)return;
  const s=P.students.find(x=>x.id===stuId);if(!s)return;
  const dues=prevSessionDue(P,s);
  settleSel=dues.map(x=>x.label);
  const remOf=m=>{const x=dues.find(d=>d.label===m);return x?x.remaining:0};
  modal('Settle old dues — '+esc(s.name),`
    <div style="font-size:13px;color:var(--mut);margin-bottom:10px">Session <b>20${sess.split('-')[0]}–${sess.split('-')[1]}</b> · ${esc(s.grade)} · fee was <b>${inr(s.fee)}</b>/mo. Tap months to select. The receipt will be saved into session ${esc(sess)} automatically.</div>
    <div class="monthsPick" id="spick">${dues.map(x=>`<button class="sel ${x.credit>0?'part':''}" data-m="${x.label}" onclick="toggleSettleMonth('${x.label}')">${x.label}${x.credit>0?`<br><small style="font-weight:600">₹${x.remaining} left</small>`:''}</button>`).join('')}</div>
    <div class="frow" style="margin-top:14px">
      <div class="fld"><label>Payment date</label><input type="date" id="st_date" value="${todayStr()}"></div>
      <div class="fld"><label>Payment method</label><select id="st_method"><option>UPI (Phone Pay)</option><option>UPI (Google Pay)</option><option>UPI (Paytm)</option><option>Cash</option><option>Bank Transfer</option><option>Cheque</option></select></div>

      <div class="fld"><label>Discount (₹)</label><input type="number" inputmode="numeric" id="st_disc" value="0" oninput="updSettleTotal()"></div>
    </div>
    <div class="fld"><label>UTR / Ref ID (optional)</label><input id="st_utr" placeholder="e.g. 655435710129"></div>
    <div class="fld"><label>Amount received (₹) — lower it if parent paid a lump sum</label>
      <input type="number" inputmode="numeric" id="st_amt" oninput="updSettleHint()"></div>
    <div id="st_hint" style="font-size:12.5px;color:var(--mut);margin:-4px 0 10px"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;background:var(--cream);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:14px">
      <b>Payable for selection</b><b id="st_total" style="font-size:20px;color:var(--navy)">₹ 0</b></div>
    <button class="btn p" style="width:100%;justify-content:center;padding:14px" onclick="doSettle('${esc(sess)}','${esc(s.id)}')">Save settlement</button>`);
  window.toggleSettleMonth=(m)=>{const i=settleSel.indexOf(m);if(i>=0)settleSel.splice(i,1);else settleSel.push(m);
    [...$('spick').children].forEach(b=>{b.classList.toggle('sel',settleSel.includes(b.dataset.m))});
    updSettleTotal()};
  window.updSettleTotal=()=>{
    const d=+$('st_disc').value||0;
    const payable=Math.max(0,settleSel.reduce((a,m)=>a+remOf(m),0)-d);
    $('st_total').textContent=inr(payable);
    $('st_amt').value=payable;
    updSettleHint();
  };

    const d=+$('st_disc').value||0;
    const payable=Math.max(0,settleSel.reduce((a,m)=>a+remOf(m),0)-d);
    const amt=+$('st_amt').value||0;
    $('st_hint').textContent=amt>0&&amt<payable?`Partial payment — ${inr(payable-amt)} will stay pending for that session.`
      :amt>payable?`⚠️ More than payable — maximum is ${inr(payable)}.`:'';
  };
  updSettleTotal();
}
async function doSettle(sess,stuId){
  const P=PREVS.find(x=>x.session===sess);if(!P)return;
  const s=P.students.find(x=>x.id===stuId);if(!s)return;
  if(!settleSel.length)return toast('Select at least one month');
  settleSel.sort((a,b)=>SESSION_MONTHS.indexOf(a)-SESSION_MONTHS.indexOf(b));
  const disc=+$('st_disc').value||0;
  const reason=$('st_reason')?$('st_reason').value.trim():'';
  if(disc>0&&!reason)return toast('Please write the purpose of the discount');
  const fee=+s.fee||0;
  const dues=prevSessionDue(P,s);
  const rem=settleSel.map(m=>{const x=dues.find(d=>d.label===m);return{label:m,remaining:x?x.remaining:0}});
  const subtotal=rem.reduce((a,x)=>a+x.remaining,0);
  const payable=Math.max(0,subtotal-disc);
  const amt=+$('st_amt').value||0;
  if(amt<=0)return toast('Enter the amount received');
  if(amt>payable+0.001)return toast('Amount is more than payable ('+inr(payable)+')');
  let pool=amt+disc;
  const months=[];
  rem.forEach(x=>{const c=Math.min(x.remaining,pool);if(c>0){months.push({label:x.label,amount:c,of:fee});pool-=c}});
  if(!months.length)return toast('Nothing to allocate — check the amount');
  /* receipt number continues that old session's own counter */
  const st=DB.settings;st.counters=st.counters||{};
  if(st.counters[sess]==null)st.counters[sess]=st.receiptCounter||1;
  const rno='NA'+String(st.counters[sess]).padStart(3,'0')+'-'+sess;
  const pay={id:'p'+Date.now(),receiptNo:rno,studentId:stuId,date:$('st_date').value||todayStr(),months,subtotal,discount:disc,discountNote:reason,total:amt,
    method:$('st_method').value,utr:$('st_utr').value.trim(),snapshot:{name:s.name,medium:s.medium,grade:s.grade}};

      const x=stat[m];const sel=collectSel.includes(m);
      if(x.state==='paid')return `<button class="paid" disabled>${m} ✓</button>`;
      if(x.state==='part')return `<button class="part ${sel?'sel':''}" data-m="${m}" onclick="toggleMonth('${m}')">${m}<br><small style="font-weight:600">₹${x.remaining} left</small></button>`;
      return `<button class="${sel?'sel':''}" data-m="${m}" onclick="toggleMonth('${m}')">${m}</button>`;
    }).join('')}</div>
    <div class="frow" style="margin-top:14px">
      <div class="fld"><label>Payment date</label><input type="date" id="c_date" value="${todayStr()}"></div>
      <div class="fld"><label>Payment method</label><select id="c_method"><option>UPI (Phone Pay)</option><option>UPI (Google Pay)</option><option>UPI (Paytm)</option><option>Cash</option><option>Bank Transfer</option><option>Cheque</option></select></div>
    </div>
    <div class="frow">
      <div class="fld"><label>Discount purpose</label>
        <input id="c_reason" list="discReasons" placeholder="Only if discount is given">
        <datalist id="discReasons">${DISC_REASONS.map(r=>`<option value="${r}">`).join('')}</datalist></div>
      <div class="fld"><label>Discount (₹)</label><input type="number" inputmode="numeric" id="c_disc" value="0" oninput="updCollectTotal()"></div>
    </div>
    <div class="fld"><label>UTR / Ref ID (optional)</label><input id="c_utr" placeholder="e.g. 655435710129"></div>
    <div class="fld"><label>Amount received (₹) — lower it if parent paid a lump sum</label>
      <input type="number" inputmode="numeric" id="c_amt" oninput="updCollectHint()"></div>
    <div id="c_hint" style="font-size:12.5px;color:var(--mut);margin:-4px 0 10px"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;background:var(--cream);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:14px">
      <b>Payable for selection</b><b id="c_total" style="font-size:20px;color:var(--navy)">₹ 0</b></div>
    <button class="btn p" style="width:100%;justify-content:center;padding:14px" onclick="savePayment('${stuId}')">Save & generate receipt</button>`);
  window.toggleMonth=(m)=>{const i=collectSel.indexOf(m);if(i>=0)collectSel.splice(i,1);else collectSel.push(m);
    [...$('mpick').children].forEach(b=>{if(b.disabled)return;const lbl=b.dataset.m;
      b.classList.toggle('sel',collectSel.includes(lbl))});
    updCollectTotal()};
  window.updCollectTotal=()=>{
    const d=+$('c_disc').value||0;
    const payable=Math.max(0,collectSel.reduce((a,m)=>a+remOf(m),0)-d);
    $('c_total').textContent=inr(payable);
    $('c_amt').value=payable; /* default: full amount; admin can lower it */
    updCollectHint();
  };
  window.updCollectHint=()=>{
    const d=+$('c_disc').value||0;
    const payable=Math.max(0,collectSel.reduce((a,m)=>a+remOf(m),0)-d);
    const amt=+$('c_amt').value||0;
    $('c_hint').textContent=amt>0&&amt<payable?`Partial payment — ${inr(payable-amt)} will stay pending and show as "partly paid".`
      :amt>payable?`⚠️ More than payable — maximum is ${inr(payable)}.`:'';
  };
  updCollectTotal();
}
async function savePayment(stuId){
  const s=student(stuId);
  if(!collectSel.length)return toast('Select at least one month');
  collectSel.sort((a,b)=>SESSION_MONTHS.indexOf(a)-SESSION_MONTHS.indexOf(b));
  const disc=+$('c_disc').value||0;
  const reason=$('c_reason')?$('c_reason').value.trim():'';
  if(disc>0&&!reason)return toast('Please write the purpose of the discount');
  const fee=+s.fee||0;
  const rem=collectSel.map(m=>({label:m,remaining:monthStatus(s,m).remaining}));
  const subtotal=rem.reduce((a,x)=>a+x.remaining,0);
  const payable=Math.max(0,subtotal-disc);
  const amt=+$('c_amt').value||0;
  if(amt<=0)return toast('Enter the amount received');
  if(amt>payable+0.001)return toast('Amount is more than payable ('+inr(payable)+')');
  /* allocate money (cash + discount) to the oldest selected months first */
  let pool=amt+disc;
  const months=[];
  rem.forEach(x=>{const c=Math.min(x.remaining,pool);if(c>0){months.push({label:x.label,amount:c,of:fee});pool-=c}});
  if(!months.length)return toast('Nothing to allocate — check the amount');
  const rno=rcptNo();
  const pay={id:'p'+Date.now(),receiptNo:rno,studentId:stuId,date:$('c_date').value||todayStr(),months,subtotal,discount:disc,discountNote:reason,total:amt,
    method:$('c_method').value,utr:$('c_utr').value.trim(),snapshot:{name:s.name,medium:s.medium,grade:s.grade}};
  DB.payments.push(pay);rcptSet(rcptCount()+1);
  await savePayments();await saveSettings();
  closeModal();render();openReceipt(pay.id);toast('Payment saved · '+rno);
}

async function saveNote(){
  const title=$('n_title').value.trim();if(!title)return toast('Enter a title');
  const file=$('n_file').files[0];const link=$('n_link').value.trim();
  const base={id:'n'+Date.now(),title,grade:$('n_grade').value,subject:$('n_sub').value,addedOn:todayStr()};
  if(file){
    if(file.size>3.5*1024*1024)return toast('PDF too big — upload to Drive and paste the link instead');
    const data=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file)});
    try{await ssetBig(skey('notepdf:'+base.id),data)}catch(e){return toast('Could not store PDF — try a link instead')}
    base.type='pdf';
  }else if(link){base.type='link';base.url=link}
  else return toast('Upload a PDF or paste a link');
  DB.notes.push(base);await saveNotes();closeModal();render();toast('Note added');
}
async function openNote(id){
  const n=DB.notes.find(x=>x.id===id);if(!n)return;
  if(n.type==='link'){window.open(n.url,'_blank');return}
  try{
    let dataUrl;
    try{dataUrl=await sgetBig(skey('notepdf:'+id))}catch(e){dataUrl=await sgetBig('na:notepdf:'+id)}
    const bin=atob(dataUrl.split(',')[1]);const arr=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
    const url=URL.createObjectURL(new Blob([arr],{type:'application/pdf'}));
    window.open(url,'_blank');
  }catch(e){toast('Could not open this PDF')}
}
async function delNote(id){
  if(!await askConfirm('Delete this note?'))return;
  const n=DB.notes.find(x=>x.id===id);
  DB.notes=DB.notes.filter(x=>x.id!==id);await saveNotes();
  if(n&&n.type==='pdf'){await sdelBig(skey('notepdf:'+id));await sdelBig('na:notepdf:'+id)}
  render();
}

  </div>
  <div class="sect">Receipt & security</div>
  <div class="card" style="max-width:620px">
    <div class="frow">
      <div class="fld"><label>Academy name (on receipt)</label><input id="s_academy" value="${esc(st.academy)}"></div>
      <div class="fld"><label>Admin PIN</label><input id="s_pin" value="${esc(st.pin)}"></div>
    </div>
    <div class="frow">
      <div class="fld"><label>Proprietor name</label><input id="s_prop" value="${esc(st.proprietor)}"></div>
      <div class="fld"><label>Signature name (cursive)</label><input id="s_sign" value="${esc(st.signName)}"></div>
    </div>
    <div class="frow">
      <div class="fld"><label>Next receipt number (this session)</label><input id="s_counter" type="number" value="${rcptCount()}"></div>
      <div class="fld"></div>
    </div>
    <div class="fld"><label>Receipt terms (one per line)</label><textarea id="s_terms" rows="3">${esc(st.terms.join('\n'))}</textarea></div>
    <button class="btn p" onclick="saveSet()">Save settings</button>
  </div>

  <div class="card" style="max-width:620px;display:flex;gap:10px;flex-wrap:wrap">
    <button class="btn o" onclick="exportBackup()">${IC.dl} Download backup (JSON)</button>
    <label class="btn o" style="cursor:pointer">Restore backup<input type="file" accept=".json" style="display:none" onchange="importBackup(this)"></label>
  </div>`;
}
async function saveSet(){
  const st=DB.settings;
  st.academy=$('s_academy').value.trim()||st.academy;
  st.proprietor=$('s_prop').value.trim();st.signName=$('s_sign').value.trim();
  rcptSet(+$('s_counter').value||rcptCount());
  st.pin=$('s_pin').value.trim()||st.pin;
  st.terms=$('s_terms').value.split('\n').map(x=>x.trim()).filter(Boolean);
  await saveSettings();render();toast('Settings saved');
}

/* ---------- session switching & new session ---------- */
async function switchSession(sess){
  if(!sess||sess===DB.settings.session)return;
  DB.settings.session=sess;await saveSettings();
  await loadSessionData();
  render();toast('Now viewing session '+sess);
}
function nextSessionName(cur){
  const m=/^(\d{2})-(\d{2})$/.exec(cur||'');
  if(!m)return '';
  return String((+m[1]+1)%100).padStart(2,'0')+'-'+String((+m[2]+1)%100).padStart(2,'0');
}
function newSessionModal(){
  modal('Start a new session',`
    <div class="fld"><label>New session (YY-YY)</label><input id="ns_name" value="${nextSessionName(DB.settings.session)}" placeholder="27-28"></div>
    <label style="display:flex;align-items:center;gap:9px;margin-top:14px;font-size:14px;cursor:pointer">
      <input type="checkbox" id="ns_copy" checked style="width:18px;height:18px"> Copy student list into the new session</label>
    <label style="display:flex;align-items:center;gap:9px;margin-top:10px;font-size:14px;cursor:pointer">
      <input type="checkbox" id="ns_promote" checked style="width:18px;height:18px"> Also move students up one class (1st → 2nd …)</label>
    <div style="font-size:12.5px;color:var(--mut);margin-top:12px;line-height:1.6">
      Attendance, homework, fees, tests, notes and notices start <b>fresh</b> in the new session.
      Session ${esc(DB.settings.session)} stays saved — you can open it anytime from Settings.</div>
    <button class="btn p" style="margin-top:16px;width:100%" onclick="startNewSession()">Create session</button>`);
}
function deleteSessionModal(){
  if(SESSIONS.length<2)return toast('Cannot delete — this is the only session');
  modal('Delete a session',`
    <div class="fld"><label>Session to delete</label><select id="ds_sel">${SESSIONS.map(x=>`<option value="${esc(x)}">Session ${esc(x)}${x===DB.settings.session?' (currently open)':''}</option>`).join('')}</select></div>
    <div style="background:#fdf2f2;border:1px solid #e8b7b7;border-radius:12px;padding:12px 14px;margin-top:12px;font-size:13px;line-height:1.6;color:var(--bad)">
      ⚠️ <b>This permanently deletes</b> that session's students, attendance, homework, fees & receipts, tests, notes and notices. <b>This cannot be undone.</b> If you only started it by mistake, this is the right place.</div>
    <div class="fld" style="margin-top:12px"><label>Type the session name to confirm (e.g. 27-28)</label><input id="ds_confirm" placeholder="Type it exactly" autocomplete="off"></div>
    <button class="btn r" style="margin-top:14px;width:100%;justify-content:center;padding:14px" onclick="doDeleteSession()">${IC.trash} Delete permanently</button>`);
}
async function doDeleteSession(){
  const sess=$('ds_sel').value;const typed=$('ds_confirm').value.trim();
  if(typed!==sess)return toast('Type the session name exactly to confirm');
  if(SESSIONS.length<2)return toast('Cannot delete the only session');
  /* purge every stored piece of that session, including note PDFs */
  const notes=await sget('na:'+sess+':notes',null)||[];
  for(const n of notes){if(n.type==='pdf')await sdelBig('na:'+sess+':notepdf:'+n.id)}
  for(const k of ['students','attendance','homework','payments','tests','notes','ann'])await sdel('na:'+sess+':'+k);
  SESSIONS=SESSIONS.filter(x=>x!==sess);await sset('na:sessions',SESSIONS);
  if(DB.settings.counters)delete DB.settings.counters[sess];
  if(DB.settings.session===sess){ /* deleted the open one → move to the latest remaining */
    DB.settings.session=SESSIONS[SESSIONS.length-1];
    await saveSettings();await loadSessionData();
  }else{
    await saveSettings();await loadPrevSessions();
  }
  closeModal();render();toast('Session '+sess+' deleted');
}
async function startNewSession(){
  const name=$('ns_name').value.trim();
  if(!/^\d{2}-\d{2}$/.test(name))return toast('Enter session like 27-28');
  if(SESSIONS.includes(name))return toast('That session already exists — open it from the list instead');
  const copy=$('ns_copy').checked,promote=$('ns_promote').checked;
  let newStudents=[];
  if(copy){
    newStudents=JSON.parse(JSON.stringify(DB.students));
    if(promote)newStudents.forEach(s=>{const i=GRADES.indexOf(s.grade);if(i>=0&&i<GRADES.length-1)s.grade=GRADES[i+1]});
  }
  SESSIONS.push(name);sset('na:sessions',SESSIONS);
  DB.settings.session=name;rcptSet(1);await saveSettings();
  DB.students=newStudents;DB.attendance={};DB.homework={};DB.payments=[];DB.tests=[];DB.notes=[];DB.ann=[];
  await Promise.all([saveStudents(),saveAttendance(),saveHomework(),savePayments(),saveTests(),saveNotes(),saveAnn()]);
  await loadPrevSessions();
  closeModal();render();
  toast('Session '+name+' started fresh 🎉');
}
function exportBackup(){
  const blob=new Blob([JSON.stringify({settings:DB.settings,students:DB.students,attendance:DB.attendance,homework:DB.homework,payments:DB.payments,tests:DB.tests,notes:DB.notes,ann:DB.ann},null,1)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='neev-academy-'+DB.settings.session+'-backup-'+todayStr()+'.json';a.click();
}
async function importBackup(inp){
  const f=inp.files[0];if(!f)return;
  try{
    const d=JSON.parse(await f.text());
    if(!await askConfirm('Restore backup? Current data will be replaced.'))return;
    DB={settings:d.settings||DB.settings,students:d.students||[],attendance:d.attendance||{},homework:d.homework||{},payments:d.payments||[],tests:d.tests||[],notes:d.notes||[],ann:d.ann||[]};
    await Promise.all([saveSettings(),saveStudents(),saveAttendance(),saveHomework(),savePayments(),saveTests(),saveNotes(),saveAnn()]);
    render();toast('Backup restored');
  }catch(e){toast('Invalid backup file')}
}

/* ================= MODAL ================= */
function modal(title,body,wide){
  $('modalHost').innerHTML=`<div class="mback" onclick="if(event.target===this)closeModal()">
    <div class="modal ${wide?'wide':''}"><div class="mhead"><h3>${title}</h3><button class="mx" onclick="closeModal()">✕</button></div>${body}</div></div>`;
}
function closeModal(){$('modalHost').innerHTML=''}
/* in-app confirm dialog — works even where browsers block native confirm() popups */
function askConfirm(msg){
  return new Promise(res=>{
    const host=document.createElement('div');
    host.innerHTML=`<div class="mback" style="z-index:9999"><div class="modal" style="max-width:340px;text-align:center">
      <p style="font-size:15px;line-height:1.6;margin:6px 0 18px">${msg}</p>
      <div style="display:flex;gap:10px">
        <button class="btn" id="cfNo" style="flex:1;background:#eef1f7">Cancel</button>
        <button class="btn r" id="cfYes" style="flex:1">Yes, do it</button>
      </div></div></div>`;
    document.body.appendChild(host);
    host.querySelector('#cfYes').onclick=()=>{host.remove();res(true)};
    host.querySelector('#cfNo').onclick=()=>{host.remove();res(false)};
  });
}
